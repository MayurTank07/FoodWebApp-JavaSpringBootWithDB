<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Add Food</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.form-card{
    border-radius:15px;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card form-card shadow p-4">

<h2 class="text-center mb-4">
Add Food
</h2>

<form action="/admin/add-food"
method="post">

<div class="mb-3">

<label>Food Name</label>

<input type="text"
name="foodName"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Price</label>

<input type="number"
name="price"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Image URL</label>

<input type="text"
name="image"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Category</label>

<select name="category"
class="form-control">

<option>Pizza</option>
<option>Burger</option>
<option>Chinese</option>
<option>Dessert</option>

</select>

</div>

<button class="btn btn-success w-100">
Add Food
</button>

</form>

</div>

</div>

</div>

</div>

</body>

</html>
