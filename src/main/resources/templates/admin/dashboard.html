<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.card-box{
    border:none;
    border-radius:15px;
    transition:0.3s;
}

.card-box:hover{
    transform:translateY(-5px);
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand">
Food Admin Panel
</a>

<a href="/admin/logout" class="btn btn-danger">
Logout
</a>

</div>

</nav>

<div class="container mt-5">

<h2 class="mb-4">
Dashboard
</h2>

<div class="row">

<div class="col-md-4">

<div class="card card-box shadow p-4 text-center">

<h3>Add Food</h3>

<a href="/admin/add-food"
class="btn btn-success mt-3">
Open
</a>

</div>

</div>

<div class="col-md-4">

<div class="card card-box shadow p-4 text-center">

<h3>Manage Food</h3>

<a href="/admin/manage-food"
class="btn btn-primary mt-3">
Open
</a>

</div>

</div>

<div class="col-md-4">

<div class="card card-box shadow p-4 text-center">

<h3>Manage Orders</h3>

<a href="/admin/manage-orders"
class="btn btn-warning mt-3">
Open
</a>

</div>

</div>

</div>

</div>

</body>

</html>
