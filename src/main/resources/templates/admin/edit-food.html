<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Edit Food</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card p-4 shadow">

<h2 class="text-center">

Edit Food

</h2>

<form
action="/admin/update-food"
method="post">

<input
type="hidden"
name="id"
th:value="${food.id}">

<div class="mb-3">

<label>Name</label>

<input
type="text"
name="foodName"
th:value="${food.foodName}"
class="form-control">

</div>

<div class="mb-3">

<label>Price</label>

<input
type="number"
name="price"
th:value="${food.price}"
class="form-control">

</div>

<div class="mb-3">

<label>Image</label>

<input
type="text"
name="image"
th:value="${food.image}"
class="form-control">

</div>

<div class="mb-3">

<label>Category</label>

<input
type="text"
name="category"
th:value="${food.category}"
class="form-control">

</div>

<button
class="btn btn-success w-100">

Update Food

</button>

</form>

</div>

</div>

</div>

</div>

</body>

</html>
