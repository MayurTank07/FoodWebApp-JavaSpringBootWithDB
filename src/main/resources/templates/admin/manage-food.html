<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Manage Foods</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.food-img{
    width:80px;
    height:80px;
    object-fit:cover;
    border-radius:10px;
}

.card-custom{
    border:none;
    border-radius:15px;
}

.page-title{
    font-weight:700;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand">
🍔 Food Admin Panel
</a>

<a href="/admin/dashboard"
class="btn btn-outline-light">

Dashboard

</a>

</div>

</nav>

<div class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2 class="page-title">

Manage Foods

</h2>

<a href="/admin/add-food"
class="btn btn-success">

* Add Food

</a>

</div>

<div class="card card-custom shadow">

<div class="card-body">

<h5 class="mb-3">

Total Foods : <span th:text="${#lists.size(foods)}"></span>

</h5>

<table class="table table-hover align-middle">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Image</th>
<th>Food Name</th>
<th>Price</th>
<th>Category</th>
<th width="220">Actions</th>

</tr>

</thead>

<tbody>

<tr th:if="${#lists.isEmpty(foods)}">

<td colspan="6"
class="text-center text-danger">

No Foods Available

</td>

</tr>

<tr th:each="food : ${foods}">

<td th:text="${food.id}"></td>

<td>

<img
th:src="${food.image}"
class="food-img">

</td>

<td th:text="${food.foodName}"></td>

<td>

₹ <span th:text="${food.price}"></span>

</td>

<td th:text="${food.category}"></td>

<td>

<a
th:href="@{'/admin/edit-food/' + ${food.id}}"
class="btn btn-warning btn-sm">

Edit

</a>

<a
th:href="@{'/admin/delete-food/' + ${food.id}}"
class="btn btn-danger btn-sm"
onclick="return confirm('Are you sure you want to delete this food?')">

Delete

</a>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</body>

</html>
