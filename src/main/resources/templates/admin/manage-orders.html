<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Manage Orders</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f5f5;
}

.card{
    border:none;
    border-radius:15px;
}

.table img{
    border-radius:10px;
}

.badge{
    font-size:15px;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand">

🍔 Food Ordering Admin

</a>

<a href="/admin/dashboard"
class="btn btn-light">

Dashboard

</a>

</div>

</nav>

<div class="container mt-5">

<div class="card shadow">

<div class="card-body">

<h2 class="mb-4">

Manage Orders

</h2>

<table class="table table-hover table-bordered align-middle">

<thead class="table-dark">

<tr>

<th>Order ID</th>

<th>Customer</th>

<th>Phone</th>

<th>Address</th>

<th>Total</th>

<th>Status</th>

<th>Order Date</th>

<th width="220">

Update Status

</th>

</tr>

</thead>

<tbody>

<tr
th:each="order : ${orders}">

<td
th:text="${order.id}">
</td>

<td
th:text="${order.customerName}">
</td>

<td
th:text="${order.phone}">
</td>

<td
th:text="${order.address}">
</td>

<td>

₹
<span
th:text="${order.totalAmount}">
</span>

</td>

<td>

<span
class="badge bg-warning text-dark"
th:text="${order.status}">
</span>

</td>

<td
th:text="${order.orderDate}">
</td>

<td>

<form
action="/admin/update-order-status"
method="post">

<input
type="hidden"
name="orderId"
th:value="${order.id}">

<select
name="status"
class="form-select mb-2">

<option
value="Pending"
th:selected="${order.status=='Pending'}">

Pending

</option>

<option
value="Preparing"
th:selected="${order.status=='Preparing'}">

Preparing

</option>

<option
value="Out For Delivery"
th:selected="${order.status=='Out For Delivery'}">

Out For Delivery

</option>

<option
value="Delivered"
th:selected="${order.status=='Delivered'}">

Delivered

</option>

<option
value="Cancelled"
th:selected="${order.status=='Cancelled'}">

Cancelled

</option>

</select>

<button
type="submit"
class="btn btn-success btn-sm w-100">

Update Status

</button>

</form>

</td>

</tr>

<tr
th:if="${#lists.isEmpty(orders)}">

<td colspan="8"
class="text-center text-danger">

No Orders Found

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</body>

</html>
