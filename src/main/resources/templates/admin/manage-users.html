<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>

Manage Users

</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{

background:#f5f5f5;

}

.card{

border:none;

border-radius:15px;

}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand">

👨 Users Management

</a>

<a href="/admin/dashboard"
class="btn btn-light">

Dashboard

</a>

</div>

</nav>

<div class="container mt-5">

<div class="card shadow">

<div class="card-body">

<h2>

Registered Users

</h2>

<hr>

<table
class="table table-hover table-bordered align-middle">

<thead
class="table-dark">

<tr>

<th>ID</th>

<th>Name</th>

<th>Email</th>

<th>Phone</th>

<th>Address</th>

<th>Registered</th>

<th width="200">

Action

</th>

</tr>

</thead>

<tbody>

<tr
th:each="user : ${users}">

<td
th:text="${user.id}">
</td>

<td
th:text="${user.name}">
</td>

<td
th:text="${user.email}">
</td>

<td
th:text="${user.phone}">
</td>

<td
th:text="${user.address}">
</td>

<td
th:text="${user.createdAt}">
</td>

<td>

<a
th:href="@{'/admin/view-user/' + ${user.id}}"
class="btn btn-primary btn-sm">

View

</a>

<a
th:href="@{'/admin/edit-user/' + ${user.id}}"
class="btn btn-warning btn-sm">

Edit

</a>

<a
th:href="@{'/admin/delete-user/' + ${user.id}}"
class="btn btn-danger btn-sm"
onclick="return confirm('Delete this user?')">

Delete

</a>

</td>

</tr>

<tr
th:if="${#lists.isEmpty(users)}">

<td colspan="7"
class="text-center text-danger">

No Users Found

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</body>

</html>
