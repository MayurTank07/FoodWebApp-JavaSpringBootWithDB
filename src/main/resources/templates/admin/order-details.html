<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Order Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="card shadow">

<div class="card-body">

<h2>
Order Details
</h2>

<hr>

<p>
<b>Order ID :</b>
<span th:text="${order.id}">
</span>
</p>

<p>
<b>Customer :</b>
<span th:text="${order.customerName}">
</span>
</p>

<p>
<b>Phone :</b>
<span th:text="${order.phone}">
</span>
</p>

<p>
<b>Address :</b>
<span th:text="${order.address}">
</span>
</p>

<p>
<b>Status :</b>
<span th:text="${order.status}">
</span>
</p>

<p>
<b>Total :</b>
₹ <span th:text="${order.totalAmount}">
</span>
</p>

<a
href="/admin/manage-orders"
class="btn btn-dark">

Back

</a>

</div>

</div>

</div>

</body>

</html>
