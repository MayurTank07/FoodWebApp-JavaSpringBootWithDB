```html
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>User Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
    background:#f5f5f5;
}

.card{
    border:none;
    border-radius:15px;
}

.profile-card{
    background:white;
}

.stat-card{
    color:white;
    border-radius:15px;
}

.order-table td,
.order-table th{
    vertical-align:middle;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand">

👤 User Details

</a>

<a href="/admin/manage-users"
class="btn btn-light">

Back

</a>

</div>

</nav>

<div class="container mt-5">

<div class="row">

<div class="col-md-4">

<div class="card profile-card shadow">

<div class="card-body text-center">

<img
src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
width="120">

<h3 class="mt-3"
th:text="${user.name}">
</h3>

<p
class="text-muted">

Registered User

</p>

<hr>

<table class="table">

<tr>

<th>Name</th>

<td
th:text="${user.name}">
</td>

</tr>

<tr>

<th>Email</th>

<td
th:text="${user.email}">
</td>

</tr>

<tr>

<th>Phone</th>

<td
th:text="${user.phone}">
</td>

</tr>

<tr>

<th>Address</th>

<td
th:text="${user.address}">
</td>

</tr>

<tr>

<th>Joined</th>

<td
th:text="${user.createdAt}">
</td>

</tr>

</table>

<a
th:href="@{'/admin/edit-user/' + ${user.id}}"
class="btn btn-warning w-100">

Edit User

</a>

</div>

</div>

</div>

<div class="col-md-8">

<div class="row">

<div class="col-md-6">

<div class="card stat-card bg-primary shadow">

<div class="card-body text-center">

<h5>

Total Orders

</h5>

<h2
th:text="${totalOrders}">
0

</h2>

</div>

</div>

</div>

<div class="col-md-6">

<div class="card stat-card bg-success shadow">

<div class="card-body text-center">

<h5>

Total Spending

</h5>

<h2>

₹
<span
th:text="${totalSpent}">
0

</span>

</h2>

</div>

</div>

</div>

</div>

<div class="card shadow mt-4">

<div class="card-body">

<h3>

Order History

</h3>

<hr>

<table
class="table table-bordered table-hover order-table">

<thead
class="table-dark">

<tr>

<th>Order ID</th>

<th>Amount</th>

<th>Status</th>

<th>Date</th>

</tr>

</thead>

<tbody>

<tr
th:each="order : ${orders}">

<td
th:text="${order.id}">
</td>

<td>

₹
<span
th:text="${order.totalAmount}">
</span>

</td>

<td>

<span
class="badge bg-warning text-dark"
th:text="${order.status}">
</span>

</td>

<td
th:text="${order.orderDate}">
</td>

</tr>

<tr
th:if="${#lists.isEmpty(orders)}">

<td
colspan="4"
class="text-center text-danger">

No Orders Found

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
```
