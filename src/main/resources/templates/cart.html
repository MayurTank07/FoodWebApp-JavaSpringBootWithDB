<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>My Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f5f5;
}
.cart-img{
    width:90px;
    height:70px;
    object-fit:cover;
    border-radius:10px;
}
.cart-box{
    background:white;
    padding:25px;
    border-radius:15px;
}
</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="/">FoodApp</a>

<div>
<span class="text-white me-3" th:if="${loggedUser != null}">
Welcome, <span th:text="${loggedUser.name}"></span>
</span>

<a href="/" class="btn btn-light me-2">Home</a>
<a href="/logout" class="btn btn-danger">Logout</a>
</div>

</div>

</nav>

<div class="container mt-5">

<h2 class="mb-4">My Cart</h2>

<div class="cart-box shadow">

<table class="table align-middle">

<thead>
<tr>
    <th>Image</th>
    <th>Food</th>
    <th>Price</th>
    <th>Quantity</th>
    <th>Total</th>
    <th>Action</th>
</tr>
</thead>

<tbody>

<tr th:each="item : ${cartItems}">
    <td>
        <img th:src="${item.image}" class="cart-img">
    </td>

    <td th:text="${item.foodName}"></td>

    <td>
        ₹ <span th:text="${item.price}"></span>
    </td>

    <td th:text="${item.quantity}"></td>

    <td>
        ₹ <span th:text="${item.totalPrice}"></span>
    </td>

    <td>
        <a th:href="@{'/remove-cart/' + ${item.id}}" class="btn btn-sm btn-danger">
            Remove
        </a>
    </td>
</tr>

</tbody>

</table>

<div th:if="${#lists.isEmpty(cartItems)}" class="text-center p-4">
    <h4>Your cart is empty</h4>
    <a href="/" class="btn btn-dark mt-3">Order Food</a>
</div>

<hr>

<div class="text-end" th:if="${!#lists.isEmpty(cartItems)}">

<h3>
Total Amount: ₹ <span th:text="${totalAmount}"></span>
</h3>

<a href="/checkout" class="btn btn-success mt-3">
Proceed To Checkout
</a>

</div>

</div>

</div>

</body>
</html>
