<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Checkout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{ background:#f5f5f5; }
.box{
    background:white;
    padding:25px;
    border-radius:15px;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="/">FoodApp</a>
<a href="/cart" class="btn btn-light">Back To Cart</a>
</div>
</nav>

<div class="container mt-5">

<div class="row">

<div class="col-md-7">
<div class="box shadow">

<h3 class="mb-4">Delivery Details</h3>

<form action="/place-order" method="post">

<div class="mb-3">
<label>Customer Name</label>
<input type="text" name="customerName" class="form-control" required>
</div>

<div class="mb-3">
<label>Phone</label>
<input type="text" name="phone" class="form-control" required>
</div>

<div class="mb-3">
<label>Address</label>
<textarea name="address" class="form-control" rows="4" required></textarea>
</div>

<div class="mb-3">
<label>Payment Method</label>
<select name="paymentMethod" class="form-control" required>
<option value="">Select Payment</option>
<option value="Cash On Delivery">Cash On Delivery</option>
<option value="UPI">UPI</option>
<option value="Card">Card</option>
</select>
</div>

<button class="btn btn-success w-100">
Place Order
</button>

</form>

</div>
</div>

<div class="col-md-5">
<div class="box shadow">

<h3>Order Summary</h3>

<hr>

<div th:each="item : ${cartItems}" class="d-flex justify-content-between mb-2">
<span>
<span th:text="${item.foodName}"></span>
x
<span th:text="${item.quantity}"></span>
</span>

<span>
₹ <span th:text="${item.totalPrice}"></span>
</span>
</div>

<hr>

<h4 class="text-end">
Total: ₹ <span th:text="${totalAmount}"></span>
</h4>

</div>
</div>

</div>

</div>

</body>
</html>
