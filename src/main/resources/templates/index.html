<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Food App</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
    background:#f5f5f5;
}

.card{
    border:none;
    border-radius:15px;
    overflow:hidden;
}

.food-img{
    height:250px;
    width:100%;
    object-fit:cover;
}

</style>

</head>

<body>

	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

	<div class="container">

	<a class="navbar-brand" href="/">
	FoodApp
	</a>

	<div>

	<span class="text-white me-3" th:if="${loggedUser != null}">
	Welcome, <span th:text="${loggedUser.name}"></span>
	</span>

	<a href="/login" class="btn btn-light me-2" th:if="${loggedUser == null}">
	Login
	</a>

	<a href="/register" class="btn btn-warning" th:if="${loggedUser == null}">
	Register
	</a>

	<a href="/logout" class="btn btn-danger" th:if="${loggedUser != null}">
	Logout
	</a>
	
	<a href="/cart" class="btn btn-outline-light me-2" th:if="${loggedUser != null}">
		Cart
	</a>
	
	<a href="/orders" class="btn btn-outline-light me-2" th:if="${loggedUser != null}">
	Orders
	</a>

	</div>

	</div>

	</nav>

<div class="container mt-5">

    <h1 class="text-center mb-5">
        Food Menu
    </h1>

    <div class="row">

        <div class="col-md-4 mb-4"
             th:each="food : ${foods}">

            <div class="card shadow">

                <img th:src="${food.image}"
                     alt="Food Image"
                     class="food-img">

                <div class="card-body">

                    <h3 th:text="${food.foodName}">
                        Food Name
                    </h3>

                    <h5>
                        ₹ <span th:text="${food.price}"></span>
                    </h5>

                    <p th:text="${food.category}">
                        Category
                    </p>

					<a th:href="@{/add-to-cart/{id}(id=${food.id})}" class="btn btn-primary">
					    Add to Cart
					</a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
