<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>My Orders</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f5f5f5;">

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="/">FoodApp</a>
<a href="/" class="btn btn-light">Home</a>
</div>
</nav>

<div class="container mt-5">

<h2 class="mb-4">My Orders</h2>

<table class="table table-bordered table-striped bg-white shadow">

<thead class="table-dark">
<tr>
<th>Order ID</th>
<th>Name</th>
<th>Phone</th>
<th>Address</th>
<th>Total</th>
<th>Status</th>
<th>Date</th>
</tr>
</thead>

<tbody>
<tr th:each="order : ${orders}">
<td>#<span th:text="${order.id}"></span></td>
<td th:text="${order.customerName}"></td>
<td th:text="${order.phone}"></td>
<td th:text="${order.address}"></td>
<td>₹ <span th:text="${order.totalAmount}"></span></td>
<td>
<span class="badge bg-warning text-dark" th:text="${order.status}"></span>
</td>
<td th:text="${#temporals.format(order.orderDate,'dd-MM-yyyy HH:mm')}"></td>
</tr>
</tbody>

</table>

<div th:if="${#lists.isEmpty(orders)}" class="text-center bg-white p-5 shadow rounded">
<h4>No orders found</h4>
<a href="/" class="btn btn-dark mt-3">Order Now</a>
</div>

</div>

</body>
</html>
