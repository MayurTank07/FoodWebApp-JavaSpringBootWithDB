<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f5f5;
}

.register-box{
    width:400px;
    margin:auto;
    margin-top:80px;
    background:white;
    padding:30px;
    border-radius:15px;
}

</style>

</head>

<body>

<div class="register-box shadow">

<h2 class="text-center mb-4">
User Registration
</h2>

<form action="/registerUser" method="post">

<div class="mb-3">

<label>Name</label>

<input type="text"
name="name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input type="email"
name="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input type="password"
name="password"
class="form-control"
required>

</div>

<button class="btn btn-dark w-100">
Register
</button>

</form>

<div class="text-center mt-3">

<a href="/login">
Already have account?
</a>

</div>

</div>

</body>

</html>
